<!DOCTYPE html>
<html>
<head>
    <title>SmartCafe HUJI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; margin: 0; background: #f8f9fa; }
        header { background: #1a73e8; color: white; padding: 1rem; text-align: center; }
        .container { padding: 1rem; max-width: 800px; margin: 0 auto; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; margin-top: 1rem; }
        .menu-card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .menu-card img { width: 100%; height: 150px; object-fit: cover; }
        .card-content { padding: 1rem; flex-grow: 1; }
        .card-price { color: #2e7d32; font-weight: bold; }
        .card-stock { font-size: 0.8rem; color: #666; }
        button.order-btn { width: 100%; padding: 0.8rem; background: #1a73e8; color: white; border: none; cursor: pointer; }
        button.order-btn:disabled { background: #ccc; }
        #order-status { margin-top: 2rem; padding: 1rem; border-radius: 8px; display: none; text-align: center; }
        .pending { background: #fff3e0; color: #e65100; }
        .ready { background: #e8f5e9; color: #2e7d32; border: 2px solid #2e7d32; }
    </style>
</head>
<body>
    <header>
        <h1>SmartCafe HUJI</h1>
    </header>
    <div class="container">
        <h2>Menu</h2>
        <div id="menu" class="menu-grid"></div>
        
        <div id="order-status">
            <h3 id="status-title">Order Status</h3>
            <p id="status-text"></p>
        </div>
    </div>

    <script>
        let currentOrderId = null;

        async function fetchMenu() {
            const res = await fetch('/api/menu');
            const items = await res.json();
            const menuDiv = document.getElementById('menu');
            menuDiv.innerHTML = '';
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'menu-card';
                card.innerHTML = `
                    <img src="${item.image_url || 'https://via.placeholder.com/200'}" alt="${item.name}">
                    <div class="card-content">
                        <h3>${item.name}</h3>
                        <p>${item.ingredients}</p>
                        <p class="card-price">₪${item.price}</p>
                        <p class="card-stock">Stock: ${item.stock_count}</p>
                    </div>
                    <button class="order-btn" onclick="placeOrder(${item.id})">Order Now</button>
                `;
                menuDiv.appendChild(card);
            });
        }

        async function placeOrder(itemId) {
            const res = await fetch('/api/order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify([itemId])
            });
            const data = await res.json();
            if (data.order_id) {
                currentOrderId = data.order_id;
                showStatus('pending', 'Preparing in Kitchen...');
                pollStatus();
            } else {
                alert('Order failed: ' + (data.detail || 'Unknown error'));
            }
        }

        function showStatus(type, text) {
            const div = document.getElementById('order-status');
            div.style.display = 'block';
            div.className = type;
            document.getElementById('status-text').innerText = text;
        }

        async function pollStatus() {
            if (!currentOrderId) return;
            const res = await fetch(`/api/order/${currentOrderId}`);
            const data = await res.json();
            if (data.status === 'ready') {
                showStatus('ready', 'Order Ready for Pickup!');
            } else {
                setTimeout(pollStatus, 5000);
            }
        }

        fetchMenu();
    </script>
</body>
</html>
