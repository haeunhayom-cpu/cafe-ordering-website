<!DOCTYPE html>
<html>
<head>
    <title>SmartCafe Admin</title>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 300px; background: #333; color: white; padding: 1.5rem; box-sizing: border-box; }
        .main { flex-grow: 1; padding: 2rem; overflow-y: auto; background: #f4f4f4; }
        h1, h2 { color: #333; }
        .sidebar h2 { color: white; }
        .form-group { margin-bottom: 1rem; }
        input, textarea { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
        button.add-btn { background: #d32f2f; color: white; border: none; padding: 10px; width: 100%; cursor: pointer; border-radius: 4px; }
        .order-card { background: white; padding: 1rem; margin-bottom: 1rem; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
        .ready-btn { background: #2e7d32; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        .logout { color: #ccc; text-decoration: none; font-size: 0.9rem; display: block; margin-top: 2rem; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Add Menu Item</h2>
        <form action="/admin/api/menu" method="post" enctype="multipart/form-data">
            <div class="form-group">
                <label>Name</label>
                <input type="text" name="name" required>
            </div>
            <div class="form-group">
                <label>Price (₪)</label>
                <input type="number" step="0.1" name="price" required>
            </div>
            <div class="form-group">
                <label>Ingredients</label>
                <textarea name="ingredients" required></textarea>
            </div>
            <div class="form-group">
                <label>Stock Count</label>
                <input type="number" name="stock_count" required>
            </div>
            <div class="form-group">
                <label>Image</label>
                <input type="file" name="image" accept="image/*">
            </div>
            <button type="submit" class="add-btn">Add to Menu</button>
        </form>
        <a href="/admin/logout" class="logout">Logout</a>
    </div>
    
    <div class="main">
        <h1>Kitchen Board</h1>
        <div id="orders-list">
            <p>Loading orders...</p>
        </div>
    </div>

    <script>
        async function fetchOrders() {
            const res = await fetch('/admin/api/orders');
            const orders = await res.json();
            const listDiv = document.getElementById('orders-list');
            listDiv.innerHTML = '';
            
            const pendingOrders = orders.filter(o => o.status === 'pending');
            
            if (pendingOrders.length === 0) {
                listDiv.innerHTML = '<p>No pending orders.</p>';
                return;
            }

            pendingOrders.forEach(order => {
                const card = document.createElement('div');
                card.className = 'order-card';
                card.innerHTML = `
                    <div>
                        <strong>Order #${order.id}</strong> - ${order.customer}<br>
                        <small>${order.items.join(', ')}</small>
                    </div>
                    <button class="ready-btn" onclick="markReady(${order.id})">Mark Ready</button>
                `;
                listDiv.appendChild(card);
            });
        }

        async function markReady(orderId) {
            await fetch(`/admin/api/order/${orderId}/ready`, { method: 'POST' });
            fetchOrders();
        }

        setInterval(fetchOrders, 3000);
        fetchOrders();
    </script>
</body>
</html>
